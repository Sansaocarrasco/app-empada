name: app_empada
description: App de vendas para empreendedor autônomo com integração Mercado Pago.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Database local
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # HTTP / API
  dio: ^5.4.3+1
  supabase_flutter: ^2.5.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Segurança / Armazenamento
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Utilitários
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
